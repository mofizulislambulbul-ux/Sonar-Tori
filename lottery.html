<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লটারি অংশগ্রহণ - সোনার তরী</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Galada&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/scrollreveal"></script>
    <style>
        :root {
            --royal-gold: #D4AF37;
            --deep-red: #B22222;
            --bright-orange: #FF4500;
            --white-ivory: #FDF5E6;
            --soft-black: #0d0d0d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background-color: var(--soft-black);
            color: var(--white-ivory);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Background Image with Blur */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('Gemini_Generated_Image_mzum72mzum72mzum.png');
            background-size: cover;
            background-position: center;
            filter: blur(12px);
            z-index: -2;
            transform: scale(1.1);
        }

        /* Flower Decorations */
        .flower-decoration {
            position: fixed;
            width: 300px;
            height: 300px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.8;
        }

        .top-left { 
            top: -50px; 
            left: -50px; 
            transform: rotate(-10deg);
        }

        .top-right { 
            top: -50px; 
            right: -50px; 
            transform: rotate(100deg);
        }

        .mid-left {
            top: 40%;
            left: -80px;
            transform: rotate(30deg);
            width: 200px;
            opacity: 0.6;
        }

        nav {
            background: rgba(139, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--royal-gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo {
            font-family: 'Galada', cursive;
            font-size: 1.8rem;
            color: var(--royal-gold);
            text-decoration: none;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px; /* মোবাইল স্পেসিং ঠিক করা হয়েছে */
            position: relative;
            z-index: 10;
        }

        /* Lottery Form Card */
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border: 2px solid var(--royal-gold);
            padding: 40px 25px; /* মোবাইল প্যাডিং অ্যাডজাস্ট */
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            text-align: center;
        }

        .form-card h2 {
            font-family: 'Galada', cursive;
            font-size: 2.8rem;
            color: var(--royal-gold);
            margin-bottom: 10px;
        }

        /* Responsive Title for Mobile */
        @media (max-width: 480px) {
            .form-card h2 { font-size: 2.2rem; }
            .flower-decoration { width: 180px; height: 180px; }
            .top-left { top: -30px; left: -30px; }
            .top-right { top: -30px; right: -30px; }
        }

        .form-card p {
            margin-bottom: 35px;
            color: #ddd;
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--royal-gold);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--royal-gold);
            background: rgba(0, 0, 0, 0.7);
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--royal-gold), #b8860b);
            color: var(--soft-black);
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .submit-btn:hover {
            background: var(--white-ivory);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #888;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <svg class="flower-decoration top-left" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="15" fill="#B22222"/>
        <path d="M50 10 Q60 30 50 50 Q40 30 50 10" fill="#FF4500"/>
        <path d="M90 50 Q70 60 50 50 Q70 40 90 50" fill="#FF4500"/>
        <path d="M50 90 Q40 70 50 50 Q60 70 50 90" fill="#FF4500"/>
        <path d="M10 50 Q30 40 50 50 Q30 60 10 50" fill="#FF4500"/>
    </svg>

    <svg class="flower-decoration top-right" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="15" fill="#B22222"/>
        <path d="M50 10 Q60 30 50 50 Q40 30 50 10" fill="#FF4500"/>
        <path d="M90 50 Q70 60 50 50 Q70 40 90 50" fill="#FF4500"/>
        <path d="M50 90 Q40 70 50 50 Q60 70 50 90" fill="#FF4500"/>
        <path d="M10 50 Q30 40 50 50 Q30 60 10 50" fill="#FF4500"/>
    </svg>

    <svg class="flower-decoration mid-left" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="15" fill="#B22222"/>
        <path d="M50 10 Q60 30 50 50 Q40 30 50 10" fill="#FF4500"/>
        <path d="M90 50 Q70 60 50 50 Q70 40 90 50" fill="#FF4500"/>
        <path d="M50 90 Q40 70 50 50 Q60 70 50 90" fill="#FF4500"/>
        <path d="M10 50 Q30 40 50 50 Q30 60 10 50" fill="#FF4500"/>
    </svg>

    <nav>
        <a href="index.html" class="nav-logo">সোনার তরী</a>
    </nav>

    <div class="main-content">
        <div class="form-card reveal">
            <h2>লটারিতে নাম লিখুন</h2>
            <p>আপনার সঠিক তথ্য দিয়ে "সোনার তরী" লটারিতে অংশগ্রহণ নিশ্চিত করুন।</p>
            
            <form id="lotteryForm">
                <div class="input-group">
                    <label for="name">আপনার নাম</label>
                    <input type="text" id="name" placeholder="আপনার পুরো নাম লিখুন" required>
                </div>

                <div class="input-group">
                    <label for="class">শ্রেণী / ক্লাস</label>
                    <input type="text" id="class" placeholder="আপনার বর্তমান শ্রেণী লিখুন" required>
                </div>

                <div class="input-group">
                    <label for="id">আইডি (ID)</label>
                    <input type="text" id="id" placeholder="আপনার স্টুডেন্ট আইডি দিন" required>
                </div>

                <button type="submit" class="submit-btn">অংশগ্রহণ নিশ্চিত করুন</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; ২০২৬ সোনার তরী | ডিজাইন: AHANAF, 230481 ,CLASS 9 (SCI)
</p>
    </footer>

<script>
ScrollReveal().reveal('.reveal', { delay: 300 });

const scriptURL = "https://script.google.com/macros/s/AKfycbx4NLSbAvZXD0xgcv_0wlZmKWM4CCi1BJdkuUbhPVpxfAmipPk6FJIjR7gnjNc5131k/exec";

document.getElementById('lotteryForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData();
    formData.append("name", document.getElementById("name").value);
    formData.append("class", document.getElementById("class").value);
    formData.append("id", document.getElementById("id").value);

    fetch(scriptURL, {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(() => {
        alert("✅ সফলভাবে জমা হয়েছে!");
        document.getElementById("lotteryForm").reset();
    })
    .catch(() => {
        alert("❌ সমস্যা হয়েছে!");
    });
});
</script>

</body>
</html>
